<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4E80AC">
<title>Kimchi's Fridge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥬</text></svg>">
<style>
  :root {
    /* Palette: Pantone Alaskan Blue 15-4225, Nantucket Breeze 14-4005,
       Cloud Dancer 11-4201, Cosmic Sky 15-3909 */
    --green: #4E80AC;        /* Alaskan Blue (deepened for contrast) */
    --green-dark: #34597B;   /* Alaskan Blue, dark */
    --green-light: #B9CCE4;  /* Nantucket Breeze */
    --cream: #F0EEE9;        /* Cloud Dancer */
    --card: #ffffff;
    --text: #2b2b2b;
    --text-soft: #6b7280;
    --border: #DDDAD2;
    --amber: #7A749E;        /* Cosmic Sky (deepened for contrast) */
    --red: #dc2626;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 14px rgba(0,0,0,.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 40;
  }
  header h1 { font-size: 19px; font-weight: 700; letter-spacing: .2px; }
  header .hdr-btns { display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(255,255,255,.15);
    border: none;
    color: #fff;
    width: 38px; height: 38px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: rgba(255,255,255,.3); }

  main { flex: 1; overflow-y: auto; padding: 14px 14px 120px; max-width: 640px; width: 100%; margin: 0 auto; }

  /* Location tabs */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 12px 14px 4px;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab.active { background: var(--green); border-color: var(--green); color: #fff; }
  .tab .count { opacity: .65; font-weight: 500; font-size: 12.5px; margin-left: 3px; }

  .searchbar {
    max-width: 640px; margin: 8px auto 0; padding: 0 14px; width: 100%;
    display: flex; gap: 8px;
  }
  .searchbar input {
    flex: 1;
    min-width: 0;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 15px;
    outline: none;
  }
  .searchbar input:focus { border-color: var(--green); }
  .searchbar select {
    flex: 0 0 auto;
    max-width: 42%;
    padding: 10px 8px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 12.5px;
    outline: none;
  }

  /* Item cards */
  .group-label {
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-soft);
    font-weight: 700;
    margin: 18px 4px 8px;
  }
  .item {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .item .emoji { font-size: 26px; width: 34px; text-align: center; flex: 0 0 auto; }
  .item .info { flex: 1; min-width: 0; }
  .item .name { font-weight: 600; font-size: 15.5px; text-transform: capitalize; }
  .item .meta { font-size: 12.5px; color: var(--text-soft); margin-top: 2px; }
  .item .info { cursor: pointer; }
  .exp-badge { font-size: 12px; font-weight: 700; margin-top: 2px; }
  .exp-badge.exp-bad { color: var(--red); }
  .exp-badge.exp-warn { color: var(--amber); }
  .exp-badge.exp-ok { color: var(--text-soft); font-weight: 500; }
  .qty-controls { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
  .qty-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-size: 16px;
    font-weight: 700;
    color: var(--green-dark);
    cursor: pointer;
    line-height: 1;
  }
  .qty-btn:active { background: var(--green-light); }
  .qty-val { min-width: 34px; text-align: center; font-weight: 700; font-size: 14px; }
  .del-btn {
    border: none; background: none; color: #c9c3b8;
    font-size: 17px; cursor: pointer; padding: 6px 2px 6px 8px; flex: 0 0 auto;
  }
  .del-btn:active { color: var(--red); }

  .empty {
    text-align: center;
    color: var(--text-soft);
    padding: 60px 20px;
    font-size: 15px;
    line-height: 1.6;
  }
  .empty .big { font-size: 44px; margin-bottom: 10px; }

  /* Bottom action bar */
  .actionbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--cream) 65%, transparent);
    padding: 18px 16px 22px;
    display: flex;
    gap: 10px;
    justify-content: center;
    z-index: 40;
  }
  .fab {
    border: none;
    border-radius: 999px;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
    display: flex; align-items: center; gap: 8px;
  }
  .fab.photo { background: var(--green); color: #fff; }
  .fab.manual { background: var(--card); color: var(--green-dark); border: 1.5px solid var(--border); }
  .fab.meals { background: var(--amber); color: #fff; }
  .fab:active { transform: scale(.97); }

  /* Modals */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,25,20,.45);
    z-index: 60;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--cream);
    width: 100%;
    max-width: 640px;
    max-height: 88vh;
    border-radius: 20px 20px 0 0;
    padding: 20px 18px 30px;
    overflow-y: auto;
    animation: slideup .22s ease;
  }
  @keyframes slideup { from { transform: translateY(40px); opacity: .4; } to { transform: none; opacity: 1; } }
  .sheet h2 { font-size: 18px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .sheet .close-x { background: none; border: none; font-size: 22px; color: var(--text-soft); cursor: pointer; padding: 4px 8px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 15px;
    background: var(--card);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--green); }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }
  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--green);
    color: #fff;
    font-size: 15.5px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  .btn.secondary { background: var(--card); color: var(--green-dark); border: 1.5px solid var(--border); }
  .btn.danger { background: #fff0f0; color: var(--red); border: 1.5px solid #f3caca; }
  .btn:disabled { opacity: .55; }
  .hint { font-size: 12.5px; color: var(--text-soft); margin-top: 6px; line-height: 1.5; }
  .hint a { color: var(--green); }

  /* Photo review */
  .review-item {
    background: var(--card);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 10px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .review-item input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--green); flex: 0 0 auto; }
  .review-item .rname { flex: 1; font-weight: 600; font-size: 14.5px; text-transform: capitalize; }
  .review-item .rqty { font-size: 12.5px; color: var(--text-soft); }
  .review-item select {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 8px;
    font-size: 13px; background: var(--cream);
  }
  .photo-preview {
    width: 100%; max-height: 200px; object-fit: cover;
    border-radius: 12px; margin-bottom: 12px; display: block;
  }

  /* Live camera capture */
  .cam-wrap {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    margin-bottom: 12px;
  }
  #camVideo {
    width: 100%;
    max-height: 60vh;
    display: block;
    object-fit: cover;
  }
  #camVideo.mirror { transform: scaleX(-1); }
  .cam-actions { display: flex; gap: 10px; }
  .cam-actions .btn { width: auto; flex: 1; margin-top: 0; }
  .cam-actions .btn.primary-shutter { flex: 1.6; }

  /* Meals */
  .meal-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 12px;
  }
  .meal-card h3 { font-size: 16.5px; color: var(--green-dark); margin-bottom: 4px; }
  .meal-card .mtime { font-size: 12.5px; color: var(--amber); font-weight: 700; margin-bottom: 8px; }
  .meal-card p { font-size: 14px; line-height: 1.55; color: var(--text); margin-bottom: 10px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  .pill {
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 999px;
    background: var(--green-light); color: var(--green-dark);
    text-transform: capitalize;
  }
  .pill.missing { background: #E9E7F1; color: var(--amber); }
  .pill-label { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-soft); margin: 8px 0 4px; }

  .spinner {
    width: 34px; height: 34px;
    border: 3.5px solid var(--green-light);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 30px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-note { text-align: center; color: var(--text-soft); font-size: 14px; }

  .toast {
    position: fixed;
    bottom: 96px; left: 50%;
    transform: translateX(-50%);
    background: var(--green-dark);
    color: #fff;
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    white-space: nowrap;
    max-width: 92vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; }
  .err-box {
    background: #fff0f0; border: 1.5px solid #f3caca; color: var(--red);
    border-radius: 10px; padding: 12px; font-size: 13.5px; line-height: 1.5; margin: 10px 0;
    word-break: break-word;
  }
</style>
</head>
<body>

<header>
  <h1>🥬 Kimchi's Fridge</h1>
  <div class="hdr-btns">
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<div class="searchbar">
  <input type="search" id="search" placeholder="Search ingredients…" oninput="render()">
  <select id="sortSel" onchange="render()">
    <option value="name">Name (A–Z)</option>
    <option value="expiring">Expiring soon</option>
    <option value="purchased-new">Newest bought</option>
    <option value="purchased-old">Oldest bought</option>
  </select>
</div>

<main id="main"></main>

<div class="actionbar">
  <button class="fab manual" onclick="openManual()">＋ Add</button>
  <button class="fab photo" onclick="startPhoto()">📷 Photo</button>
  <button class="fab meals" onclick="openMeals()">🍽️ Meals</button>
</div>

<input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
<input type="file" id="importInput" accept="application/json,.json" hidden>

<!-- Manual add / edit sheet -->
<div class="overlay" id="manualOverlay">
  <div class="sheet">
    <h2><span id="manualTitle">Add ingredient</span> <button class="close-x" onclick="closeSheet('manualOverlay')">✕</button></h2>
    <div class="field"><label>Name</label><input id="mName" placeholder="e.g. chicken thighs" autocomplete="off"></div>
    <div class="row2">
      <div class="field"><label>Quantity</label><input id="mQty" type="number" inputmode="decimal" value="1" min="0" step="any"></div>
      <div class="field"><label>Unit</label>
        <select id="mUnit">
          <option value="">count</option><option>lb</option><option>oz</option><option>g</option><option>kg</option>
          <option>cup</option><option>bunch</option><option>bag</option><option>box</option><option>can</option>
          <option>jar</option><option>bottle</option><option>carton</option><option>dozen</option><option>pack</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Location</label>
      <select id="mLoc">
        <option value="fridge">🧊 Refrigerator</option>
        <option value="freezer">❄️ Freezer</option>
        <option value="pantry">🥫 Pantry</option>
        <option value="spices">🧂 Spice drawer</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>Purchase date</label><input id="mPurchase" type="date"></div>
      <div class="field"><label>Expiration date</label><input id="mExp" type="date"></div>
    </div>
    <button class="btn" id="manualSaveBtn" onclick="addManual()">Add to inventory</button>
    <button class="btn danger" id="manualDeleteBtn" style="display:none" onclick="deleteFromEdit()">Delete item</button>
  </div>
</div>

<!-- Live camera sheet -->
<div class="overlay" id="cameraOverlay">
  <div class="sheet">
    <h2>Take a photo <button class="close-x" onclick="closeCameraSheet()">✕</button></h2>
    <div class="cam-wrap">
      <video id="camVideo" autoplay playsinline muted></video>
      <canvas id="camCanvas" hidden></canvas>
    </div>
    <div class="err-box" id="camError" hidden></div>
    <div class="cam-actions">
      <button class="btn secondary" onclick="flipCamera()">🔄 Flip</button>
      <button class="btn primary-shutter" id="camShutter" onclick="capturePhoto()" disabled>📸 Capture</button>
    </div>
    <button class="btn secondary" style="margin-top:8px" onclick="useFileInstead()">🖼 Choose a photo instead</button>
  </div>
</div>

<!-- Photo review sheet -->
<div class="overlay" id="photoOverlay">
  <div class="sheet">
    <h2>Photo results <button class="close-x" onclick="closeSheet('photoOverlay')">✕</button></h2>
    <div id="photoBody"></div>
  </div>
</div>

<!-- Meals sheet -->
<div class="overlay" id="mealsOverlay">
  <div class="sheet">
    <h2>Meal ideas <button class="close-x" onclick="closeSheet('mealsOverlay')">✕</button></h2>
    <div id="mealsBody"></div>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>Settings <button class="close-x" onclick="closeSheet('settingsOverlay')">✕</button></h2>
    <div class="field">
      <label>Anthropic API key</label>
      <input id="apiKey" type="password" placeholder="sk-ant-…" autocomplete="off">
      <div class="hint">Used for photo recognition and meal ideas. Stored only in this browser. Get a key at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.</div>
    </div>
    <div class="field">
      <label>AI model</label>
      <select id="modelSel">
        <option value="claude-haiku-4-5">Fast &amp; cheap (Haiku)</option>
        <option value="claude-sonnet-4-5">Smartest (Sonnet)</option>
      </select>
    </div>
    <button class="btn" onclick="saveSettings()">Save settings</button>
    <button class="btn secondary" onclick="exportData()">⬇️ Export backup</button>
    <button class="btn secondary" onclick="document.getElementById('importInput').click()">⬆️ Import backup</button>
    <button class="btn danger" onclick="clearAll()">Delete all inventory</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------- state & persistence ---------- */
const LOCATIONS = {
  fridge:  { label: "Refrigerator", emoji: "🧊" },
  freezer: { label: "Freezer",      emoji: "❄️" },
  pantry:  { label: "Pantry",       emoji: "🥫" },
  spices:  { label: "Spice drawer", emoji: "🧂" }
};
const LS_DATA = "kitcheninv_data_v1";
const LS_KEY  = "kitcheninv_apikey";
const LS_MODEL = "kitcheninv_model";

let items = [];
let activeTab = "all";

function load() {
  try { items = JSON.parse(localStorage.getItem(LS_DATA) || "[]"); }
  catch { items = []; }
  if (!Array.isArray(items)) items = [];
}
function save() {
  localStorage.setItem(LS_DATA, JSON.stringify(items));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ---------- emoji guess ---------- */
const EMOJI_MAP = [
  [/chicken|turkey|poultry/, "🍗"], [/beef|steak|ground meat/, "🥩"], [/pork|bacon|ham|sausage/, "🥓"],
  [/fish|salmon|tuna|cod|tilapia/, "🐟"], [/shrimp|prawn/, "🦐"], [/egg/, "🥚"],
  [/milk|cream(?!\s*cheese)/, "🥛"], [/cheese/, "🧀"], [/butter/, "🧈"], [/yogurt/, "🥣"],
  [/bread|baguette|roll|bun/, "🍞"], [/tortilla|wrap/, "🫓"], [/rice/, "🍚"], [/pasta|spaghetti|noodle|macaroni/, "🍝"],
  [/tomato/, "🍅"], [/potato/, "🥔"], [/carrot/, "🥕"], [/onion/, "🧅"], [/garlic/, "🧄"],
  [/pepper(?!corn)|capsicum|jalape/, "🫑"], [/broccoli/, "🥦"], [/lettuce|spinach|kale|greens|cabbage|arugula/, "🥬"],
  [/cucumber|zucchini/, "🥒"], [/corn/, "🌽"], [/mushroom/, "🍄"], [/avocado/, "🥑"],
  [/apple/, "🍎"], [/banana/, "🍌"], [/orange|citrus|clementine/, "🍊"], [/lemon|lime/, "🍋"],
  [/berry|berries/, "🫐"], [/strawberr/, "🍓"], [/grape/, "🍇"], [/peach|nectarine/, "🍑"], [/mango/, "🥭"],
  [/bean|lentil|chickpea/, "🫘"], [/peanut|almond|cashew|walnut|nut/, "🥜"],
  [/oil|olive oil/, "🫒"], [/honey/, "🍯"], [/salt/, "🧂"], [/sugar|flour/, "🥡"],
  [/soup|broth|stock/, "🥣"], [/juice/, "🧃"], [/wine/, "🍷"], [/beer/, "🍺"],
  [/ice cream|gelato/, "🍨"], [/chocolate|cocoa/, "🍫"], [/cereal|oat|granola/, "🥣"],
  [/herb|basil|cilantro|parsley|thyme|rosemary|oregano|mint|dill/, "🌿"],
  [/spice|cumin|paprika|cinnamon|turmeric|curry|chili powder|peppercorn|nutmeg|clove|cardamom/, "🌶️"],
  [/tofu/, "🧊"], [/sauce|ketchup|mustard|mayo|salsa/, "🥫"]
];
function emojiFor(name, loc) {
  const n = (name || "").toLowerCase();
  for (const [re, e] of EMOJI_MAP) if (re.test(n)) return e;
  return LOCATIONS[loc] ? LOCATIONS[loc].emoji : "🍽️";
}

/* ---------- rendering ---------- */
function sortComparator(mode) {
  const byName = (a, b) => a.name.localeCompare(b.name);
  if (mode === "expiring") {
    return (a, b) => {
      const ea = a.expDate || "9999-12-31", eb = b.expDate || "9999-12-31";
      return ea === eb ? byName(a, b) : (ea < eb ? -1 : 1);
    };
  }
  if (mode === "purchased-new") {
    return (a, b) => {
      const pa = a.purchaseDate || "0000-01-01", pb = b.purchaseDate || "0000-01-01";
      return pa === pb ? byName(a, b) : (pa > pb ? -1 : 1);
    };
  }
  if (mode === "purchased-old") {
    return (a, b) => {
      const pa = a.purchaseDate || "9999-12-31", pb = b.purchaseDate || "9999-12-31";
      return pa === pb ? byName(a, b) : (pa < pb ? -1 : 1);
    };
  }
  return byName;
}
function render() {
  const tabsEl = document.getElementById("tabs");
  const counts = { all: items.length };
  for (const k of Object.keys(LOCATIONS)) counts[k] = items.filter(i => i.location === k).length;
  tabsEl.innerHTML =
    tabBtn("all", "🏠 All", counts.all) +
    Object.entries(LOCATIONS).map(([k, v]) => tabBtn(k, `${v.emoji} ${v.label}`, counts[k])).join("");

  const q = document.getElementById("search").value.trim().toLowerCase();
  const sortMode = document.getElementById("sortSel").value;
  let list = items.slice().sort(sortComparator(sortMode));
  if (activeTab !== "all") list = list.filter(i => i.location === activeTab);
  if (q) list = list.filter(i => i.name.toLowerCase().includes(q));

  const main = document.getElementById("main");
  if (!list.length) {
    main.innerHTML = `<div class="empty"><div class="big">🧺</div>${
      items.length ? "No matches here." :
      "Your kitchen is empty!<br>Snap a <b>📷 Photo</b> of your groceries or tap <b>＋ Add</b> to get started."
    }</div>`;
    return;
  }

  // Group by location for the default alphabetical "All" view (location is implied
  // by the group header); any date-based sort shows one flat cross-location list
  // instead, since the point is to see what's expiring soonest across the whole kitchen.
  let html = "";
  if (activeTab === "all" && sortMode === "name") {
    for (const [k, v] of Object.entries(LOCATIONS)) {
      const group = list.filter(i => i.location === k);
      if (!group.length) continue;
      html += `<div class="group-label">${v.emoji} ${v.label}</div>` + group.map(i => itemHTML(i, false)).join("");
    }
  } else {
    const showLocation = activeTab === "all";
    html = list.map(i => itemHTML(i, showLocation)).join("");
  }
  main.innerHTML = html;
}
function tabBtn(key, label, count) {
  return `<button class="tab ${activeTab === key ? "active" : ""}" onclick="setTab('${key}')">${label}<span class="count">${count}</span></button>`;
}
function setTab(k) { activeTab = k; render(); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function formatShortDate(isoDateStr) {
  const d = new Date(isoDateStr + "T00:00:00");
  if (isNaN(d)) return "";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function expirationInfo(i) {
  if (!i.expDate) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(i.expDate + "T00:00:00");
  const days = Math.round((exp - today) / 86400000);
  if (days < 0) return { text: `⚠️ Expired ${Math.abs(days)}d ago`, cls: "exp-bad" };
  if (days === 0) return { text: `⚠️ Expires today`, cls: "exp-bad" };
  if (days <= 3) return { text: `⏰ Expires in ${days}d`, cls: "exp-warn" };
  return { text: `Exp ${formatShortDate(i.expDate)}`, cls: "exp-ok" };
}
function itemHTML(i, showLocation) {
  const qty = i.qty % 1 === 0 ? i.qty : i.qty.toFixed(1);
  const bought = i.purchaseDate ? ` · bought ${formatShortDate(i.purchaseDate)}` : "";
  const locTag = showLocation ? ` · ${LOCATIONS[i.location].emoji} ${LOCATIONS[i.location].label}` : "";
  const exp = expirationInfo(i);
  return `<div class="item">
    <div class="emoji">${emojiFor(i.name, i.location)}</div>
    <div class="info" onclick="openManual('${i.id}')" title="Tap to edit">
      <div class="name">${esc(i.name)}</div>
      <div class="meta">${qty}${i.unit ? " " + esc(i.unit) : ""}${bought}${locTag}</div>
      ${exp ? `<div class="exp-badge ${exp.cls}">${exp.text}</div>` : ""}
    </div>
    <div class="qty-controls">
      <button class="qty-btn" onclick="bumpQty('${i.id}',-1)">−</button>
      <span class="qty-val">${qty}</span>
      <button class="qty-btn" onclick="bumpQty('${i.id}',1)">＋</button>
    </div>
    <button class="del-btn" onclick="removeItem('${i.id}')" title="Remove">🗑</button>
  </div>`;
}

/* ---------- item ops ---------- */
function addItem(name, qty, unit, location, purchaseDate, expDate) {
  name = String(name || "").trim();
  if (!name) return false;
  purchaseDate = purchaseDate || "";
  expDate = expDate || "";
  // Merge only when the dates match too — a differently-dated batch of the same
  // ingredient (e.g. an older carton of milk) is tracked as its own row so it can be
  // sorted/expired independently, instead of being blended into one combined quantity.
  const existing = items.find(i =>
    i.name.toLowerCase() === name.toLowerCase() && i.location === location &&
    (i.unit || "") === (unit || "") &&
    (i.purchaseDate || "") === purchaseDate && (i.expDate || "") === expDate);
  if (existing) { existing.qty += (qty || 1); }
  else items.push({ id: uid(), name, qty: qty || 1, unit: unit || "", location, purchaseDate, expDate, addedAt: Date.now() });
  save(); render();
  return true;
}
function bumpQty(id, d) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  it.qty = Math.round((it.qty + d) * 10) / 10;
  if (it.qty <= 0) items = items.filter(i => i.id !== id);
  save(); render();
}
function removeItem(id) { items = items.filter(i => i.id !== id); save(); render(); }

/* ---------- manual add / edit ---------- */
let editingId = null;
function openManual(id) {
  editingId = id || null;
  const it = editingId ? items.find(i => i.id === editingId) : null;
  if (editingId && !it) editingId = null; // stale id, fall back to add mode

  document.getElementById("manualTitle").textContent = it ? "Edit ingredient" : "Add ingredient";
  document.getElementById("mName").value = it ? it.name : "";
  document.getElementById("mQty").value = it ? it.qty : 1;
  document.getElementById("mUnit").value = it ? (it.unit || "") : "";
  document.getElementById("mLoc").value = it ? it.location :
    (activeTab !== "all" && LOCATIONS[activeTab] ? activeTab : "fridge");
  document.getElementById("mPurchase").value = it ? (it.purchaseDate || "") :
    new Date().toISOString().slice(0, 10);
  document.getElementById("mExp").value = it ? (it.expDate || "") : "";
  document.getElementById("manualSaveBtn").textContent = it ? "Save changes" : "Add to inventory";
  document.getElementById("manualDeleteBtn").style.display = it ? "block" : "none";

  openSheet("manualOverlay");
  if (!it) setTimeout(() => document.getElementById("mName").focus(), 250);
}
function addManual() {
  const name = document.getElementById("mName").value;
  const qty = parseFloat(document.getElementById("mQty").value) || 1;
  const unit = document.getElementById("mUnit").value;
  const loc = document.getElementById("mLoc").value;
  const purchaseDate = document.getElementById("mPurchase").value;
  const expDate = document.getElementById("mExp").value;
  if (!name.trim()) return;

  if (editingId) {
    const it = items.find(i => i.id === editingId);
    if (it) {
      Object.assign(it, { name: name.trim(), qty, unit, location: loc, purchaseDate, expDate });
      save(); render();
      toast(`Saved ${name.trim()} ✓`);
    }
    editingId = null;
    closeSheet("manualOverlay");
    return;
  }
  if (addItem(name, qty, unit, loc, purchaseDate, expDate)) {
    closeSheet("manualOverlay");
    toast(`Added ${name.trim()} ✓`);
  }
}
function deleteFromEdit() {
  if (!editingId) return;
  if (!confirm("Remove this item?")) return;
  removeItem(editingId);
  editingId = null;
  closeSheet("manualOverlay");
}

/* ---------- sheets & toast ---------- */
function openSheet(id) { document.getElementById(id).classList.add("open"); }
function closeSheet(id) { document.getElementById(id).classList.remove("open"); }
document.querySelectorAll(".overlay").forEach(o =>
  o.addEventListener("click", e => {
    if (e.target !== o) return;
    if (o.id === "cameraOverlay") stopCameraStream();
    o.classList.remove("open");
  }));
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

/* ---------- settings ---------- */
function openSettings() {
  document.getElementById("apiKey").value = localStorage.getItem(LS_KEY) || "";
  document.getElementById("modelSel").value = localStorage.getItem(LS_MODEL) || "claude-haiku-4-5";
  openSheet("settingsOverlay");
}
function saveSettings() {
  localStorage.setItem(LS_KEY, document.getElementById("apiKey").value.trim());
  localStorage.setItem(LS_MODEL, document.getElementById("modelSel").value);
  closeSheet("settingsOverlay");
  toast("Settings saved ✓");
}
function needKey() {
  const k = localStorage.getItem(LS_KEY);
  if (k) return k;
  toast("Add your Anthropic API key first");
  openSettings();
  return null;
}
function exportData() {
  const blob = new Blob([JSON.stringify({ exported: new Date().toISOString(), items }, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `kimchis-fridge-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
document.getElementById("importInput").addEventListener("change", async e => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    const arr = Array.isArray(data) ? data : data.items;
    if (!Array.isArray(arr)) throw new Error("bad format");
    for (const it of arr) {
      if (it && it.name && LOCATIONS[it.location]) {
        addItem(it.name, Number(it.qty) || 1, it.unit || "", it.location, it.purchaseDate || "", it.expDate || "");
      }
    }
    closeSheet("settingsOverlay");
    toast("Backup imported ✓");
  } catch { toast("Couldn't read that file"); }
  e.target.value = "";
});
function clearAll() {
  if (!confirm("Delete ALL inventory items? This can't be undone.")) return;
  items = []; save(); render();
  closeSheet("settingsOverlay");
}

/* ---------- Claude API ---------- */
async function callClaude(content, maxTokens) {
  const key = localStorage.getItem(LS_KEY);
  const model = localStorage.getItem(LS_MODEL) || "claude-haiku-4-5";
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "content-type": "application/json"
    },
    body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: "user", content }] })
  });
  if (!res.ok) {
    let msg = `API error ${res.status}`;
    try { const j = await res.json(); if (j.error && j.error.message) msg = j.error.message; } catch {}
    throw new Error(msg);
  }
  const j = await res.json();
  return j.content.map(b => b.text || "").join("");
}
function extractJSON(text) {
  const m = text.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
  if (!m) throw new Error("The AI response couldn't be read. Try again.");
  return JSON.parse(m[0]);
}

/* ---------- photo recognition ---------- */
let pendingPhoto = null;

function startPhoto() {
  if (!needKey()) return;
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    openCameraSheet();
  } else {
    document.getElementById("photoInput").click();
  }
}

/* Live camera capture (works on phones and laptops/desktops with a webcam) */
let camStream = null;
let camFacing = "environment";
async function openCameraSheet() {
  document.getElementById("camError").hidden = true;
  document.getElementById("camVideo").hidden = false;
  document.getElementById("camShutter").disabled = true;
  openSheet("cameraOverlay");
  await startCameraStream(camFacing);
}
async function startCameraStream(facing) {
  stopCameraStream();
  const video = document.getElementById("camVideo");
  const shutter = document.getElementById("camShutter");
  const errBox = document.getElementById("camError");
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing } },
      audio: false
    });
    camStream = stream;
    camFacing = facing;
    video.hidden = false;
    errBox.hidden = true;
    video.classList.toggle("mirror", facing === "user");
    video.srcObject = stream;
    try { await video.play(); } catch {}
    shutter.disabled = false;
  } catch (err) {
    video.hidden = true;
    shutter.disabled = true;
    errBox.hidden = false;
    errBox.textContent = `⚠️ Couldn't access your camera (${err.message || err.name || "unknown error"}). You can choose a photo instead.`;
  }
}
function stopCameraStream() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
}
function flipCamera() {
  startCameraStream(camFacing === "environment" ? "user" : "environment");
}
function closeCameraSheet() {
  stopCameraStream();
  closeSheet("cameraOverlay");
}
function useFileInstead() {
  closeCameraSheet();
  document.getElementById("photoInput").click();
}
function capturePhoto() {
  const video = document.getElementById("camVideo");
  if (!video.videoWidth) { toast("Camera still loading — try again in a second"); return; }
  const maxDim = 1100;
  const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
  const c = document.getElementById("camCanvas");
  c.width = Math.round(video.videoWidth * scale);
  c.height = Math.round(video.videoHeight * scale);
  c.getContext("2d").drawImage(video, 0, 0, c.width, c.height);
  const dataUrl = c.toDataURL("image/jpeg", 0.85);
  closeCameraSheet();
  openSheet("photoOverlay");
  runPhotoAnalysis(dataUrl, dataUrl.split(",")[1]);
}

/* File-picker fallback (also used when the user chooses "photo instead") */
document.getElementById("photoInput").addEventListener("change", async e => {
  const f = e.target.files[0];
  e.target.value = "";
  if (!f) return;
  openSheet("photoOverlay");
  const body = document.getElementById("photoBody");
  body.innerHTML = `<div class="spinner"></div><div class="loading-note">Looking at your photo…</div>`;
  try {
    const { dataUrl, b64 } = await resizeImage(f, 1100);
    await runPhotoAnalysis(dataUrl, b64);
  } catch (err) {
    body.innerHTML = `<div class="err-box">⚠️ ${esc(err.message)}</div><button class="btn secondary" onclick="closeSheet('photoOverlay')">Close</button>`;
  }
});

/* Shared: send a resized photo (dataUrl + base64) to Claude and render results */
async function runPhotoAnalysis(dataUrl, b64) {
  pendingPhoto = dataUrl;
  const body = document.getElementById("photoBody");
  body.innerHTML = `<div class="spinner"></div><div class="loading-note">Looking at your photo…</div>`;
  try {
    const text = await callClaude([
      { type: "image", source: { type: "base64", media_type: "image/jpeg", data: b64 } },
      { type: "text", text:
`Identify every food ingredient visible in this photo. Respond with ONLY a JSON array, no other text. Each element:
{"name":"lowercase singular ingredient name","qty":<number, best guess of count/amount>,"unit":"count unit like '' (blank for each), 'lb', 'bunch', 'bag', 'can', 'jar', 'bottle', 'box', 'carton', 'dozen'","location":"one of: fridge, freezer, pantry, spices — where this is typically stored"}
Rules: use generic ingredient names (e.g. "cheddar cheese" not brand names). If you see multiples of the same item, one entry with the total qty. If nothing edible is visible, return [].` }
    ], 1500);
    const found = extractJSON(text);
    renderPhotoReview(found);
  } catch (err) {
    body.innerHTML = `<div class="err-box">⚠️ ${esc(err.message)}</div><button class="btn secondary" onclick="closeSheet('photoOverlay')">Close</button>`;
  }
}
function resizeImage(file, maxDim) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      const dataUrl = c.toDataURL("image/jpeg", 0.82);
      resolve({ dataUrl, b64: dataUrl.split(",")[1] });
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => reject(new Error("Couldn't read that image"));
    img.src = URL.createObjectURL(file);
  });
}
function renderPhotoReview(found) {
  const body = document.getElementById("photoBody");
  if (!Array.isArray(found) || !found.length) {
    body.innerHTML = `${pendingPhoto ? `<img class="photo-preview" src="${pendingPhoto}">` : ""}
      <div class="empty" style="padding:24px">No ingredients spotted in this photo. Try a closer shot with good lighting.</div>
      <button class="btn secondary" onclick="closeSheet('photoOverlay')">Close</button>`;
    return;
  }
  const locOpts = loc => Object.entries(LOCATIONS).map(([k, v]) =>
    `<option value="${k}" ${k === loc ? "selected" : ""}>${v.emoji} ${v.label}</option>`).join("");
  body.innerHTML =
    (pendingPhoto ? `<img class="photo-preview" src="${pendingPhoto}">` : "") +
    `<div class="hint" style="margin-bottom:10px">I spotted ${found.length} ingredient${found.length > 1 ? "s" : ""} — uncheck anything wrong, adjust where it's stored, then add.</div>` +
    found.map((f, idx) => {
      const loc = LOCATIONS[f.location] ? f.location : "pantry";
      const qty = Number(f.qty) > 0 ? Number(f.qty) : 1;
      return `<div class="review-item">
        <input type="checkbox" checked data-idx="${idx}">
        <span style="font-size:20px">${emojiFor(f.name, loc)}</span>
        <span class="rname">${esc(f.name || "unknown")}<div class="rqty">${qty}${f.unit ? " " + esc(f.unit) : ""}</div></span>
        <select data-locidx="${idx}">${locOpts(loc)}</select>
      </div>`;
    }).join("") +
    `<button class="btn" onclick="confirmPhotoAdd()">Add selected to inventory</button>`;
  body.dataset.found = JSON.stringify(found);
}
function confirmPhotoAdd() {
  const body = document.getElementById("photoBody");
  const found = JSON.parse(body.dataset.found || "[]");
  const today = new Date().toISOString().slice(0, 10);
  let added = 0;
  body.querySelectorAll("input[type=checkbox]").forEach(cb => {
    if (!cb.checked) return;
    const idx = Number(cb.dataset.idx);
    const f = found[idx];
    const sel = body.querySelector(`select[data-locidx="${idx}"]`);
    const loc = sel ? sel.value : (LOCATIONS[f.location] ? f.location : "pantry");
    // AI can't know the expiration date, but a photo is usually taken of what's
    // in the kitchen right now, so default purchase date to today; edit later to add
    // an expiration date by tapping the item.
    if (addItem(f.name, Number(f.qty) > 0 ? Number(f.qty) : 1, f.unit || "", loc, today, "")) added++;
  });
  closeSheet("photoOverlay");
  pendingPhoto = null;
  toast(added ? `Added ${added} ingredient${added > 1 ? "s" : ""} ✓ — tap any item to add an expiration date` : "Nothing selected");
}

/* ---------- meal ideas ---------- */
function openMeals() {
  if (!needKey()) return;
  if (!items.length) { toast("Add some ingredients first!"); return; }
  openSheet("mealsOverlay");
  fetchMeals();
}
async function fetchMeals() {
  const body = document.getElementById("mealsBody");
  body.innerHTML = `<div class="spinner"></div><div class="loading-note">Thinking about what you can cook…</div>`;
  const inv = Object.entries(LOCATIONS).map(([k, v]) => {
    const group = items.filter(i => i.location === k);
    if (!group.length) return "";
    return `${v.label}: ` + group.map(i => `${i.name} (${i.qty}${i.unit ? " " + i.unit : ""})`).join(", ");
  }).filter(Boolean).join("\n");
  try {
    const text = await callClaude([{ type: "text", text:
`Here is my current kitchen inventory:

${inv}

Suggest 4 meals I could realistically cook. Prefer meals using ONLY what I have; it's OK if a meal needs 1-3 common extra items. Respond with ONLY a JSON array, no other text. Each element:
{"name":"meal name","time":"e.g. 30 min","description":"2 short sentences: what it is and roughly how to make it","uses":["ingredient names from my inventory"],"missing":["items I'd need to buy, empty array if none"]}
Order them best-match first (fewest missing items).` }], 2500);
    const meals = extractJSON(text);
    if (!Array.isArray(meals) || !meals.length) throw new Error("No suggestions returned. Try again.");
    body.innerHTML = meals.map(m => `
      <div class="meal-card">
        <h3>${esc(m.name || "Meal")}</h3>
        <div class="mtime">⏱ ${esc(m.time || "—")}</div>
        <p>${esc(m.description || "")}</p>
        ${Array.isArray(m.uses) && m.uses.length ? `<div class="pill-label">From your kitchen</div><div class="pill-row">${m.uses.map(u => `<span class="pill">${esc(u)}</span>`).join("")}</div>` : ""}
        ${Array.isArray(m.missing) && m.missing.length ? `<div class="pill-label">You'd need</div><div class="pill-row">${m.missing.map(u => `<span class="pill missing">${esc(u)}</span>`).join("")}</div>` : ""}
      </div>`).join("") +
      `<button class="btn secondary" onclick="fetchMeals()">🔄 More ideas</button>`;
  } catch (err) {
    body.innerHTML = `<div class="err-box">⚠️ ${esc(err.message)}</div>
      <button class="btn secondary" onclick="fetchMeals()">Try again</button>`;
  }
}

/* ---------- boot ---------- */
load();
render();
</script>
